# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set-option default-terminal "screen-256color" # This is required for the backspace key to work on MacOS

set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'sainnhe/tmux-fzf' # General purpose tmux fzf plugin
set -g @plugin 'nirmitleo/tmux-fzf-session-switch' # Switch tmux sessions with fzf, the window that I see when I press prefix + F
set -g @plugin 'nirmitleo/tmux-fzf-claude-switch' # Switch tmux sessions with claude-code with fzf, the window that I see when I press prefix + F
set -g @plugin 'nhdaly/tmux-better-mouse-mode' # Mouse support
set -g @plugin 'tmux-plugins/tmux-yank' # Copy to clipboard
TMUX_FZF_LAUNCH_KEY="F" # this is shift + f
set -g @fzf-goto-session 'C-f'
set -g @fzf-goto-win-width 70
set -g @fzf-goto-win-height 20
set -g @fzf-goto-session-without-prefix 'true'
set -g history-limit 50000
set-option -g status-left-length 50

set -g mouse on
set-option -g mouse on 

bind -n S-Right next-window
bind -n S-Left previous-window

bind -n 'C-M-e' select-layout tiled

# split window vertically (this does not work)
bind -n 'C-S-/' split-window -v

# split window horizontally (this does not work)
bind -n 'C-S--' split-window -h

# select pane left, right, up, down with shift + option + arrow keys
bind -n S-M-Left select-pane -L
bind -n S-M-Right select-pane -R
bind -n S-M-Up select-pane -U
bind -n S-M-Down select-pane -D

# set pane active border style to brightred and bold
set -g pane-active-border-style fg=brightred,bg=colour235,bold
# set pane border status to top
set -g pane-border-status top
# toggle pane title visibility
bind t run 'zsh -c "arr=( off top ) && tmux setw pane-border-status \${arr[\$(( \${arr[(I)#{pane-border-status}]} % 2 + 1 ))]}"'
# rename pane
bind -n C-t command-prompt -p "New title:" 'run-shell "tmux select-pane -T \"$(echo %% | xargs)\""'

# bind -n C-Right next-window
# bind -n C-Left previous-window
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
